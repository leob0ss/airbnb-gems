services:
  db:
    image: mysql:8.4
    container_name: airbnb-gems-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: airbnb_gems
      MYSQL_DATABASE: airbnb_gems
    volumes:
      - airbnb_gems_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pairbnb_gems"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  airbnb_gems_mysql:
